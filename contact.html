<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with Jeeya BK, IT student & system administrator.">
    <title>Jeeya BK | Contact</title>
    <!-- Modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <!-- Component Scripts -->
    <script src="js/components.js" defer></script>
</head>
<body>
    <site-header active="contact"></site-header>

    <main>
        <header class="page-header" style="margin-bottom: -3rem; padding-bottom: 6rem;">
            <div class="container animate-fade-in" style="text-align: center;">
                <h1>Let's Connect</h1>
                <p style="color: rgba(255,255,255,0.8); max-width: 600px; margin: 0 auto; font-size: 1.125rem;">
                    Seeking robust IT infrastructure alignments? Drop me a message and let's get talking about your core networks and systems architecture.
                </p>
            </div>
        </header>

        <section class="container" style="position: relative; z-index: 10;">
            <div class="contact-card">
                <form action="#" method="POST">
                    
                    <div class="form-group">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email" class="form-label">Work Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="john@enterprise.com" required>
                    </div>

                    <div class="form-group">
                        <label for="subject" class="form-label">Subject Topic</label>
                        <select id="subject" name="subject" class="form-control" required style="cursor: pointer;">
                            <option value="" disabled selected>Select an inquiry area...</option>
                            <option value="system_admin">System Administration Job/Project</option>
                            <option value="server">Server Deployments & Mentoring</option>
                            <option value="linux">Linux Infrastructure Consulting</option>
                            <option value="other">General Inquiries / Office Setup</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="message" class="form-label">Message Requirements</label>
                        <textarea id="message" name="message" class="form-control" rows="5" placeholder="Could you assist in architecting a high-load web server network...?" style="resize: vertical;" required></textarea>
                    </div>
                    
                    <div style="margin-top: 2rem;">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                            Dispatch Message
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 0.5rem;">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>

                </form>
            </div>
        </section>

    </main>

    <site-footer></site-footer>
</body>
</html>
